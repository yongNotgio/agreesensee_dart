name: agrisense
description: "AgriSense — Integrated Agricultural Decision Support System mobile portals (Farmer & Cooperative)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Backend / sync
  supabase_flutter: ^2.8.0

  # Charts & analytics
  fl_chart: ^0.69.2

  # Formatting & utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  collection: ^1.18.0

  # Offline-first local cache
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
